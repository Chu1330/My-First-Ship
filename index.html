<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chu | HR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #f4f6fb 0%, #e9edf5 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #ffffff;
    max-width: 480px;
    width: 100%;
    border-radius: 16px;
    padding: 48px 40px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    text-align: center;
  }
  .avatar {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f6df5, #7b5ff0);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 32px;
    font-weight: 600;
    margin: 0 auto 24px;
  }
  h1 {
    font-size: 26px;
    color: #1a1a2e;
    margin-bottom: 6px;
  }
  .role {
    font-size: 15px;
    color: #4f6df5;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .desc {
    font-size: 15px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 32px;
  }
  .contact {
    display: inline-block;
    background: #1a1a2e;
    color: #fff;
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.2s ease;
  }
  .contact:hover {
    transform: translateY(-2px);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="avatar">C</div>
    <h1>Chu</h1>
    <div class="role">Human Resources</div>
    <p class="desc">
      I help colleagues navigate everything people-related — from onboarding
      and benefits to workplace questions and support. If it involves people
      at work, I'm here to help.
    </p>
    <a href="#" class="contact">Reach out anytime</a>
  </div>
</body>
</html>
